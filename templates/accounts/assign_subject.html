<h3>Assign Subject</h3>

<form method="post">
    {% csrf_token %}

    <select name="teacher">
        {% for t in teachers %}
        <option value="{{ t.id }}">{{ t.get_full_name }}</option>
        {% endfor %}
    </select>

    <select name="subject">
        {% for s in subjects %}
        <option value="{{ s.id }}">{{ s.name }}</option>
        {% endfor %}
    </select>

    <button type="submit">Assign</button>
</form>

<hr>

<h4>Assigned Subjects</h4>

{% for a in assignments %}
<p>{{ a.teacher.get_full_name }} → {{ a.subject.name }}</p>
{% endfor %}
